name: Run Lint

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        cache: npm
        cache-dependency-path: package-lock.json
    - run: npm ci
    - run: npm run lint
